# Source — Postgres
debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
debezium.source.database.hostname=postgres
debezium.source.database.port=5432
debezium.source.database.user=postgres
debezium.source.database.password=postgres
debezium.source.database.dbname=task_db
debezium.source.topic.prefix=task-server
debezium.source.plugin.name=pgoutput

# Only watch the outbox_events table
debezium.source.table.include.list=public.outbox_events

# Outbox routing
debezium.source.transforms=outbox
debezium.source.transforms.outbox.type=io.debezium.transforms.outbox.EventRouter
debezium.source.transforms.outbox.route.by.field=type
debezium.source.transforms.outbox.table.field.event.id=id
debezium.source.transforms.outbox.table.field.event.key=aggregateid
debezium.source.transforms.outbox.table.field.event.payload=payload
debezium.source.transforms.outbox.table.field.event.timestamp=created_at
debezium.source.transforms.outbox.table.field.event.type=type

# Offset storage
debezium.source.offset.storage.file.filename=/tmp/offsets.dat
debezium.source.offset.flush.interval.ms=1000

# Sink — Kafka
debezium.sink.type=kafka
debezium.sink.kafka.producer.bootstrap.servers=kafka:9092
debezium.sink.kafka.producer.key.serializer=org.apache.kafka.common.serialization.StringSerializer
debezium.sink.kafka.producer.value.serializer=org.apache.kafka.common.serialization.StringSerializer